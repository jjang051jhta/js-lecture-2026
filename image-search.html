<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div>
        <input type="text" placeholder="검색할 이미지를 입력하세요" id="search-word">
        <button id="btn-search">검색</button>
    </div>
    <ul id="image-list">
      <!-- <li>
        <img
          src="https://search1.kakaocdn.net/argon/130x130_85_c/HN2EdGRt4PN"
        /> -->
      </li>
    </ul>
    <script>
      const searchWord = document.querySelector("#search-word");
      const btnSearch = document.querySelector("#btn-search");
      searchWord.addEventListener("keydown",function(e){
        //e는 이벤트 객체를 가리킨다.
        //console.log(e.keyCode===13)
        if(e.keyCode===13) {
          searchImage(searchWord.value);
        }
      })
      btnSearch.addEventListener("click",function(){
        searchImage(searchWord.value);
      })
      // '문자열(String)',"문자열(String)",`문자열(String)`
      async function searchImage(searchWord) {
        const response = await fetch(
          `https://dapi.kakao.com/v2/search/image?query=${searchWord}`,
          {
            method: "GET",
            headers: {
              Authorization: "KakaoAK c2b6828b16439b8dd302446432809501",
            },
          },
        );
        const data = await response.json();
        const imageList = document.querySelector("#image-list");
        data.documents.forEach(function(item){
          const li = document.createElement("li");
          const img = document.createElement("img");
          img.src = item.thumbnail_url;
          li.appendChild(img);
          imageList.appendChild(li);
        })
        console.log(data);
      }
      //searchImage();
    </script>
  </body>
</html>
